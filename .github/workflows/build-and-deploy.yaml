name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Required to pull down the theme, 'kayal' which is installed as a submodule.
          submodules: recursive

      - name: Set up deploy keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'

      # My wife is judging me harshly for deploying to a server instead of using S3 or GitHub Pages.
      # She literally made a joke about using, "...good 'ol Nginx" not knowing that I was literally doing that.
      # I stand by my choices .... (ish)
      - name: Build and deploy Hugo sites
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Fail the whole job on any error, unset var, or broken pipe, so a bad
          # build can never silently rsync a half-baked site to production.
          set -euo pipefail

          for dname in *.lol; do
            echo -e "\n\n==== NOW BUILDING ${dname} ===="

            # --cleanDestinationDir guarantees a fresh build: stale files from a
            # removed post or asset can't linger in public/ and get deployed.
            hugo --source "${dname}" --destination public --cleanDestinationDir

            if [ ! -f "${dname}/deploy" ]; then
              echo "${dname}: no deploy marker, built only -- skipping deploy."
              continue
            fi

            # Guard: refuse to deploy a build that produced no usable homepage.
            # Catches the "hugo exited 0 but emitted nothing useful" failure mode.
            if [ ! -s "${dname}/public/index.html" ]; then
              echo "::error::${dname}: build produced no index.html -- refusing to deploy."
              exit 1
            fi

            echo "==== DEPLOYING ${dname} ===="
            rsync -av -e "ssh -o StrictHostKeyChecking=no" \
              "${dname}/public/" "${DEPLOY_USER}@${dname}:/var/www/${dname}/"
          done
