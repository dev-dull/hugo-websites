name: Sync YouTube videos

# Manually triggered: run it after you publish a video. It reads the channel
# RSS feed, writes a draft page bundle for any video not already on the site,
# and opens a PR for you to curate (slug, title, description) before merging.
on:
  workflow_dispatch:
    inputs:
      feed_url:
        description: "YouTube channel RSS feed URL"
        required: false
        default: "https://www.youtube.com/feeds/videos.xml?channel_id=UCEQngyGaouaoleaXcjd2iog"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Refuse to run while a sync PR is open: a re-run regenerates from main and
      # would clobber any slug/title/description curation done on that PR. Merge
      # or close it first.
      - name: Fail if a YouTube Sync PR is already open
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh pr list --repo "${{ github.repository }}" \
            --head youtube-sync --state open --json number --jq '.[].number')
          if [ -n "$existing" ]; then
            echo "::error::A YouTube Sync PR is already open (#${existing}). Merge or close it before syncing again."
            exit 1
          fi
          echo "No open YouTube Sync PR -- proceeding."

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Sync videos from the feed
        run: python3 bin/yt-sync.py --feed "${{ inputs.feed_url }}"

      - name: Open a PR with any new videos
        uses: peter-evans/create-pull-request@v7
        with:
          branch: youtube-sync
          delete-branch: true
          commit-message: "Add new videos from the YouTube RSS feed"
          title: "Sync new YouTube videos"
          body: |
            Auto-generated entries for videos in the channel RSS feed that
            weren't on the site yet. Created by `bin/yt-sync.py`.

            Before merging, curate each new `content/videos/<slug>/index.md`:
            - shorten the slug (the folder name) to match your style
            - tidy the title and trim the description
            - adjust the date if you want something other than the upload time

            These are `draft: false`, so they publish when this PR merges -- this
            review is the gate.
          labels: youtube-sync
